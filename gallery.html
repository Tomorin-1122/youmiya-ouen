<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>羊宫国 — 羊宮妃那応援站</title>
<meta name="description" content="羊宫妃那粉丝应援站，非官方">
<meta property="og:title" content="羊宫国 — 羊宮妃那応援站">
<meta property="og:description" content="羊宫妃那粉丝应援站，非官方">
<meta property="og:image" content="data/avatar/avatar.jpg">
<meta property="og:type" content="website">
<link rel="icon" type="image/jpeg" href="data/avatar/avatar.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sidebar-w: 200px;
  --bg: #fffaf6;
  --bg-warm: #fdf5ee;
  --sidebar-bg: linear-gradient(180deg, #fff0f5 0%, #fce4ec 50%, #f8bbd0 100%);
  --sidebar-text: #8e6b7e;
  --sidebar-active: #d4728a;
  --sidebar-hover: rgba(212, 114, 138, 0.08);
  --accent: #d4728a;
  --accent-soft: #e8a0b4;
  --accent-light: #fde4ef;
  --heart: #d4728a;
  --heart-glow: rgba(212, 114, 138, 0.2);
  --text: #4a3540;
  --text-light: #b08a9a;
  --card-radius: 6px;
  --font: 'Noto Sans SC', 'Microsoft YaHei', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  --font-serif: 'Noto Serif SC', 'Source Han Serif SC', 'SimSun', serif;
  --wiki-border: #e0d0d8;
  --wiki-bg: #fdf8fa;
  --wiki-header-bg: #f8eef2;
}

.dark-theme {
  --bg: #1a1a2e;
  --bg-warm: #16213e;
  --sidebar-bg: linear-gradient(180deg, #0f3460 0%, #16213e 50%, #1a1a2e 100%);
  --sidebar-text: #a8a8b3;
  --sidebar-active: #e8a0b4;
  --sidebar-hover: rgba(232, 160, 180, 0.15);
  --accent: #e8a0b4;
  --accent-soft: #d4728a;
  --accent-light: #2a1a2e;
  --heart: #e8a0b4;
  --heart-glow: rgba(232, 160, 180, 0.3);
  --text: #e0e0e0;
  --text-light: #8a8a9a;
  --wiki-border: #2a2a3e;
  --wiki-bg: #1a1a2e;
  --wiki-header-bg: #0f3460;
}

html { font-size: 16px; scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  line-height: 1.75;
}

/* ===== Sidebar Nav ===== */
.sidebar {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  z-index: 100;
  border-right: 1px solid rgba(212, 114, 138, 0.08);
  overflow-y: auto;
}

.sidebar-header {
  padding: 28px 16px 20px;
  text-align: center;
  border-bottom: 1px solid rgba(212, 114, 138, 0.08);
}

.sidebar-title {
  font-family: var(--font-serif);
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.2em;
}

.sidebar-sub {
  font-size: 0.7rem;
  color: var(--text-light);
  letter-spacing: 0.15em;
  margin-top: 2px;
}

.sidebar-avatar {
  width: 80px; height: 80px;
  border-radius: 20%;
  margin: 16px auto 0;
  display: block;
  border: 2px solid rgba(212, 114, 138, 0.2);
  box-shadow: 0 4px 20px rgba(212, 114, 138, 0.15);
  overflow: hidden;
  object-fit: cover;
}

.sidebar-nav { padding: 10px 0; flex: 1; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  color: var(--sidebar-text);
  text-decoration: none;
  font-size: 0.88rem;
  font-weight: 400;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.25s ease;
  border-radius: 0;
  margin: 1px 8px;
  border-radius: 10px;
}

.nav-item:hover { color: var(--accent); background: var(--sidebar-hover); }
.nav-item.active {
  color: var(--sidebar-active);
  font-weight: 500;
  background: rgba(212, 114, 138, 0.1);
  border-radius: 10px;
}

.nav-icon { font-size: 1rem; width: 22px; text-align: center; }

.sidebar-theme-toggle {
  padding: 6px 8px 16px;
  text-align: center;
}

.theme-toggle-btn {
  background: rgba(212, 114, 138, 0.06);
  border: none;
  border-radius: 8px;
  padding: 8px 16px;
  cursor: pointer;
  font-size: 1.1rem;
  transition: all 0.3s ease;
  color: var(--sidebar-text);
  width: 100%;
}

.theme-toggle-btn:hover {
  background: var(--sidebar-hover);
  color: var(--accent);
}

/* ===== Main ===== */
.main { margin-left: var(--sidebar-w); flex: 1; min-height: 100dvh; }

.content-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(255, 250, 246, 0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(212, 114, 138, 0.08);
}

.dark-theme .content-header {
  background: rgba(26, 26, 46, 0.92);
  border-bottom-color: rgba(232, 160, 180, 0.1);
}

.page-title {
  font-family: var(--font-serif);
  font-size: 1.1rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--text);
}

.page-title span { color: var(--accent); }

.menu-toggle {
  display: none;
  width: 32px; height: 32px;
  border: none;
  background: var(--accent-light);
  border-radius: 8px;
  font-size: 1rem;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  color: var(--accent);
}

/* ===== Photos Masonry ===== */
.masonry {
  columns: 4;
  column-gap: 10px;
  padding: 10px 14px 40px;
  max-width: 1400px;
  margin: 0 auto;
}

.masonry-item {
  break-inside: avoid;
  margin-bottom: 10px;
  border-radius: var(--card-radius);
  overflow: hidden;
  cursor: pointer;
  background: #f5ede8;
  transition: transform 0.2s;
  position: relative;
}

.masonry-item:hover { transform: translateY(-2px); }

.liked-item {
  box-shadow: 0 0 0 2px rgba(212, 114, 138, 0.3);
  border-radius: var(--card-radius);
}

.liked-item img {
  border-radius: var(--card-radius);
}

.masonry-item img {
  width: 100%;
  display: block;
  transition: transform 0.3s;
}

.masonry-item:hover img { transform: scale(1.02); }

.photos-section { display: block; }
.photos-section.hidden { display: none; }

/* ===== Wiki Section — Encyclopedia Style ===== */
.wiki-section {
  display: none;
  max-width: 960px;
  margin: 0 auto;
  padding: 28px 24px 60px;
  font-size: 1rem;
  line-height: 1.9;
}

.wiki-section.active { display: block; }

/* Wiki Title */
.wiki-title {
  font-family: var(--font-serif);
  font-size: 2rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.06em;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--accent);
  margin-bottom: 16px;
}

.wiki-title-sub {
  font-size: 0.8rem;
  color: var(--text-light);
  font-weight: 400;
  margin-left: 8px;
  letter-spacing: 0;
}

/* Quote */
.wiki-quote {
  font-size: 1rem;
  color: var(--text);
  padding: 14px 18px;
  margin-bottom: 20px;
  border-left: 3px solid var(--accent-soft);
  background: var(--wiki-bg);
  border-radius: 0 6px 6px 0;
  font-style: italic;
  line-height: 1.7;
}

.wiki-quote-source {
  font-size: 0.85rem;
  color: var(--text-light);
  margin-top: 4px;
  font-style: normal;
}

/* Intro */
.wiki-intro {
  margin-bottom: 24px;
  font-size: 1rem;
}

/* Infobox — right floating card like Wikipedia */
.wiki-infobox {
  float: right;
  width: 280px;
  margin: 0 0 16px 20px;
  border: 1px solid var(--wiki-border);
  border-radius: 6px;
  overflow: hidden;
  background: var(--wiki-bg);
  font-size: 0.9rem;
}

.wiki-infobox-title {
  background: var(--wiki-header-bg);
  padding: 10px 12px;
  font-weight: 700;
  font-size: 0.95rem;
  text-align: center;
  letter-spacing: 0.06em;
  border-bottom: 1px solid var(--wiki-border);
}

.wiki-infobox-photo {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
  display: block;
  background: #ede7e0;
}

.wiki-infobox-caption {
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-light);
  padding: 6px 8px;
  border-bottom: 1px solid var(--wiki-border);
}

.wiki-infobox table {
  width: 100%;
  border-collapse: collapse;
}

.wiki-infobox th {
  background: var(--wiki-header-bg);
  padding: 8px 10px;
  text-align: left;
  font-weight: 500;
  font-size: 0.85rem;
  width: 70px;
  border-bottom: 1px solid var(--wiki-border);
  vertical-align: top;
}

.wiki-infobox td {
  padding: 8px 10px;
  font-size: 0.88rem;
  border-bottom: 1px solid var(--wiki-border);
  vertical-align: top;
}

.wiki-infobox tr:last-child th,
.wiki-infobox tr:last-child td { border-bottom: none; }

/* Section headers */
.wiki-h2 {
  font-family: var(--font-serif);
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--text);
  padding: 12px 0 6px;
  border-bottom: 1px solid var(--wiki-border);
  margin: 28px 0 12px;
  letter-spacing: 0.04em;
}

.wiki-h3 {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text);
  margin: 18px 0 8px;
  padding-left: 10px;
  border-left: 3px solid var(--accent-soft);
}

/* Body text */
.wiki-p {
  margin-bottom: 10px;
}

/* Lists */
.wiki-ul {
  list-style: none;
  padding: 0;
  margin-bottom: 12px;
}

.wiki-li {
  padding: 4px 0 4px 18px;
  position: relative;
  font-size: 0.95rem;
}

.wiki-li::before {
  content: '•';
  position: absolute;
  left: 4px;
  color: var(--accent-soft);
}

/* Role list */
.role-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 6px 20px;
}

.role-item {
  padding: 4px 0;
  font-size: 0.95rem;
}

.role-name { font-weight: 500; }
.role-work { color: var(--text-light); font-size: 0.88rem; }

/* Relations */
.relations-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 8px;
  margin-bottom: 12px;
}

.relation-card {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  background: var(--bg-warm);
  border: 1px solid rgba(212, 114, 138, 0.08);
  border-radius: 6px;
  font-size: 0.9rem;
}

.relation-icon { font-size: 1.1rem; }

.relation-name { font-weight: 500; }
.relation-desc { font-size: 0.8rem; color: var(--text-light); }

/* Source */
.wiki-source {
  margin-top: 30px;
  padding-top: 12px;
  border-top: 1px solid var(--wiki-border);
  font-size: 0.85rem;
  color: var(--text-light);
}

.wiki-source a { color: var(--accent); text-decoration: none; }
.wiki-source a:hover { text-decoration: underline; }

/* Videos */
.videos-section {
  display: none;
  padding: 20px;
}
.videos-section.active { display: block; }
.videos-header { text-align: center; margin-bottom: 24px; }
.videos-header h2 { font-family: var(--font-serif); font-size: 1.3rem; color: var(--text); }
.videos-header p { color: var(--text-light); font-size: 0.9rem; margin-top: 4px; }
.videos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  max-width: 1200px;
  margin: 0 auto;
}
.video-card {
  background: var(--card-bg);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.video-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.12);
}
.video-card-thumb {
  position: relative;
  aspect-ratio: 16/9;
  overflow: hidden;
  background: #000;
}
.video-card-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.video-card-duration {
  position: absolute;
  bottom: 6px;
  right: 6px;
  background: rgba(0,0,0,0.8);
  color: #fff;
  font-size: 0.75rem;
  padding: 1px 5px;
  border-radius: 3px;
}
.video-card-play {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  width: 48px;
  height: 48px;
  background: rgba(0,0,0,0.6);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
}
.video-card:hover .video-card-play { opacity: 1; }
.video-card-play::after {
  content: '';
  border-left: 14px solid #fff;
  border-top: 9px solid transparent;
  border-bottom: 9px solid transparent;
  margin-left: 3px;
}
.video-card-info {
  padding: 10px 12px;
}
.video-card-title {
  font-size: 0.85rem;
  color: var(--text);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
/* Video lightbox */
.video-lightbox {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.9);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.video-lightbox.active { display: flex; }
.video-lightbox-content {
  width: 90%;
  max-width: 960px;
  max-height: 85vh;
  position: relative;
}
.video-lightbox-content::before {
  content: '';
  display: block;
  padding-bottom: 56.25%; /* 16:9 */
}
.video-lightbox-content iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  border: none;
  border-radius: 8px;
}
#videoPlayer {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
}
.video-lightbox-close {
  position: absolute;
  top: -40px;
  right: 0;
  background: none;
  border: none;
  color: #fff;
  font-size: 1.5rem;
  cursor: pointer;
}

/* ===== Lightbox ===== */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(20, 16, 18, 0.94);
  backdrop-filter: blur(8px);
}

.lightbox.show { display: flex; }

.lightbox-close {
  position: absolute;
  top: 16px; right: 20px;
  width: 36px; height: 36px;
  border: none;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
  color: #fff;
  font-size: 1.2rem;
  cursor: pointer;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}

.lightbox-close:hover { background: rgba(255,255,255,0.2); }

.lightbox-image-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 50px 16px 100px;
  position: relative;
}

.lightbox-image-wrap img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 4px;
}

.lightbox-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 40px; height: 40px;
  border: none;
  background: rgba(255,255,255,0.08);
  border-radius: 50%;
  color: #fff;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}

.lightbox-nav:hover { background: rgba(255,255,255,0.18); }
.lightbox-nav.prev { left: 16px; }
.lightbox-nav.next { right: 16px; }

.lightbox-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 16px 20px;
  background: linear-gradient(transparent, rgba(20, 16, 18, 0.85));
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.lightbox-meta { color: rgba(255,255,255,0.85); font-size: 0.8rem; }
.lightbox-author { font-weight: 600; color: var(--accent-soft); }
.lightbox-time { color: rgba(255,255,255,0.4); font-size: 0.7rem; margin-top: 2px; }

.lightbox-actions { display: flex; gap: 10px; }

.action-btn {
  border: none;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
  width: 40px; height: 40px;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  transition: all 0.2s;
}

.action-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }

.action-btn.heart-btn.liked {
  background: var(--heart);
  color: #fff;
  box-shadow: 0 0 16px var(--heart-glow);
}

@keyframes heartPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.35); }
  100% { transform: scale(1); }
}

.heart-pop { animation: heartPop 0.3s ease; }

/* Empty / Loading */
.empty-state { text-align: center; padding: 100px 30px; color: var(--text-light); }
.empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
.empty-title { font-family: var(--font-serif); font-size: 1.1rem; color: var(--text); margin-bottom: 6px; }

.loading { text-align: center; padding: 100px 30px; color: var(--text-light); }

.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 99; }
.sidebar-overlay.show { display: block; }

/* Responsive */
@media (max-width: 1100px) { .masonry { columns: 3; } }
@media (max-width: 800px) {
  :root { --sidebar-w: 0px; }
  .sidebar { transform: translateX(-100%); transition: transform 0.3s; width: 200px; }
  .sidebar.open { transform: translateX(0); }
  .menu-toggle { display: flex; }
  .masonry { columns: 3; column-gap: 6px; padding: 6px 8px 30px; }
  .masonry-item { margin-bottom: 6px; }
  .wiki-infobox { float: none; width: 100%; margin: 0 0 20px 0; }
}

@media (max-width: 500px) {
  .masonry { columns: 2; column-gap: 5px; padding: 5px 6px 24px; }
  .masonry-item { margin-bottom: 5px; border-radius: 4px; }
}

/* Sakura */
@keyframes fall {
  0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.7; }
  90% { opacity: 0.7; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

.sakura { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }

.sakura-petal {
  position: absolute;
  width: 10px; height: 10px;
  background: radial-gradient(ellipse, #ffb7c5 30%, transparent 70%);
  border-radius: 50% 0 50% 0;
  opacity: 0;
  animation: fall linear infinite;
}

.photos-section ~ .sakura { display: none; }

/* ===== Voices Section ===== */
.voices-section {
  display: none;
  padding: 20px;
  max-width: 900px;
  margin: 0 auto;
}

.voices-section.active {
  display: block;
}

.voices-header {
  text-align: center;
  margin-bottom: 30px;
}

.voices-title {
  font-family: var(--font-serif);
  font-size: 2rem;
  color: var(--accent);
  margin-bottom: 10px;
}

.voices-subtitle {
  color: var(--text-light);
  font-size: 0.95rem;
}

.voices-filter {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 30px;
}

.filter-btn {
  padding: 8px 20px;
  border: 1px solid var(--accent-soft);
  background: var(--bg);
  color: var(--text);
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 0.9rem;
}

.filter-btn:hover {
  background: var(--accent-light);
  border-color: var(--accent);
}

.filter-btn.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.filter-btn:active {
  transform: scale(0.97);
}

.nav-item:active {
  transform: scale(0.98);
}

.masonry-item:active {
  transform: scale(0.98);
}

.voices-list {
  display: grid;
  gap: 25px;
}

.voice-card {
  background: var(--bg-warm);
  border-radius: var(--card-radius);
  box-shadow: 0 2px 10px rgba(212, 114, 138, 0.06);
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.voice-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(212, 114, 138, 0.1);
}

.voice-card-header {
  padding: 20px 20px 10px;

<script>
let allPosts = [];
let currentIndex = -1;
let likes = new Set(JSON.parse(localStorage.getItem('likes') || '[]'));

function formatTime(isoStr) {
  if (!isoStr) return '';
  try {
    const d = new Date(isoStr);
    const now = new Date();
    const diffMs = now - d;
    const diffMin = Math.floor(diffMs / 60000);
    const diffHr = Math.floor(diffMs / 3600000);
    const diffDay = Math.floor(diffMs / 86400000);
    if (diffMin < 1) return 'たった今';
    if (diffMin < 60) return `${diffMin}分前`;
    if (diffHr < 24) return `${diffHr}時間前`;
    if (diffDay < 7) return `${diffDay}日前`;
    const m = d.getMonth() + 1, day = d.getDate();
    return d.getFullYear() === now.getFullYear() ? `${m}月${day}日` : `${d.getFullYear()}年${m}月${day}日`;
  } catch { return ''; }
}

function saveLikes() { localStorage.setItem('likes', JSON.stringify([...likes])); }

function toggleLike(postId, btn) {
  if (likes.has(postId)) {
    likes.delete(postId);
    btn.classList.remove('liked');
    btn.innerHTML = '♡';
  } else {
    likes.add(postId);
    btn.classList.add('liked');
    btn.innerHTML = '♥';
    btn.classList.add('heart-pop');
    setTimeout(() => btn.classList.remove('heart-pop'), 300);
  }
  saveLikes();
  renderMasonry();
}

function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escapeUrl(u) { try { const url = new URL(u); return ['http:', 'https:'].includes(url.protocol) ? u : '#'; } catch { return '#'; } }

function renderMasonry() {
  const masonry = document.getElementById('masonry');
  if (allPosts.length === 0) {
    masonry.innerHTML = '<div class="empty-state"><div class="empty-icon">📷</div><div class="empty-title">还没有照片</div></div>';
    return;
  }
  // 点赞的照片排前面
  const sorted = [...allPosts].sort((a, b) => {
    const la = likes.has(a.id) ? 0 : 1;
    const lb = likes.has(b.id) ? 0 : 1;
    return la - lb;
  });
  masonry.innerHTML = sorted.map((post, idx) => {
    const img = post.images?.[0];
    const imgPath = img ? `data/images/${img.filename}` : '';
    const likedClass = likes.has(post.id) ? ' liked-item' : '';
    return `<div class="masonry-item${likedClass}" data-post-id="${escapeHtml(post.id)}"><img src="${escapeHtml(imgPath)}" alt="" loading="lazy"></div>`;
  }).join('');
  masonry.querySelectorAll('.masonry-item').forEach(item => {
    item.addEventListener('click', () => {
      const postId = item.dataset.postId;
      const idx = allPosts.findIndex(p => p.id === postId);
      if (idx >= 0) openLightbox(idx);
    });
  });
}

function openLightbox(idx) {
  currentIndex = idx;
  const post = allPosts[idx];
  const img = post.images?.[0];
  if (!img) return;
  document.getElementById('lightboxImg').src = `data/images/${img.filename}`;
  document.getElementById('lightboxAuthor').textContent = post.account_name || '羊宮妃那';
  document.getElementById('lightboxTime').textContent = formatTime(post.time || post.scraped_at);
  const hb = document.getElementById('lightboxHeart');
  const liked = likes.has(post.id);
  hb.className = `action-btn heart-btn ${liked ? 'liked' : ''}`;
  hb.innerHTML = liked ? '♥' : '♡';
  hb.dataset.id = post.id;
  document.getElementById('lightboxPrev').style.display = idx > 0 ? 'flex' : 'none';
  document.getElementById('lightboxNext').style.display = idx < allPosts.length - 1 ? 'flex' : 'none';
  document.getElementById('lightbox').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() { document.getElementById('lightbox').classList.remove('show'); document.body.style.overflow = ''; currentIndex = -1; }
function navLightbox(dir) { const n = currentIndex + dir; if (n >= 0 && n < allPosts.length) openLightbox(n); }

document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
document.getElementById('lightboxPrev').addEventListener('click', () => navLightbox(-1));
document.getElementById('lightboxNext').addEventListener('click', () => navLightbox(1));
document.getElementById('lightbox').addEventListener('click', e => { if (e.target === e.currentTarget || e.target.classList.contains('lightbox-image-wrap')) closeLightbox(); });
document.getElementById('lightboxHeart').addEventListener('click', e => toggleLike(e.currentTarget.dataset.id, e.currentTarget));

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('show')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
  if (e.key === ' ') { e.preventDefault(); const hb = document.getElementById('lightboxHeart'); toggleLike(hb.dataset.id, hb); }
});

// Section switching
function switchSection(name) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`.nav-item[data-section="${name}"]`).classList.add('active');
  document.getElementById('photosSection').classList.toggle('hidden', name !== 'photos');
  document.getElementById('wikiSection').classList.toggle('active', name === 'wiki');
  document.getElementById('videosSection').classList.toggle('active', name === 'videos');
  document.getElementById('voicesSection').classList.toggle('active', name === 'voices');
  document.getElementById('aboutSection').classList.toggle('active', name === 'about');
  const titles = { 
    wiki: t('wiki'), 
    photos: t('photos'), 
    videos: t('videos'), 
    voices: t('voices'), 
    about: t('about') 
  };
  document.getElementById('pageTitle').innerHTML = titles[name] || '';
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
  
  // Load voices data when switching to voices section
  if (name === 'voices' && !window.voicesLoaded) {
    loadVoices();
    window.voicesLoaded = true;
  }
  // Load videos data when switching to videos section
  if (name === 'videos' && !window.videosLoaded) {
    loadVideos();
    window.videosLoaded = true;
  }
}

document.querySelectorAll('.nav-item').forEach(item => item.addEventListener('click', () => switchSection(item.dataset.section)));
document.getElementById('menuToggle').addEventListener('click', () => { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('show'); });
document.getElementById('sidebarOverlay').addEventListener('click', () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); });

// Sakura
function createSakura() {
  const c = document.getElementById('sakura');
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = 'sakura-petal';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (8 + Math.random() * 8) + 's';
    p.style.animationDelay = Math.random() * 10 + 's';
    p.style.width = (8 + Math.random() * 6) + 'px';
    p.style.height = p.style.width;
    c.appendChild(p);
  }
}

// Load wiki
async function loadWiki() {
  try {
    const resp = await fetch('data/wiki.json');
    const w = await resp.json();
    const container = document.getElementById('wikiSection');

    // Parse roles into name + work pairs
    const roles = (w.sections?.find(s => s.id === 'roles')?.content || []).map(r => {
      const m = r.match(/^(.+?)\s*——\s*(.+)$/);
      return m ? { name: m[1], work: m[2] } : { name: r, work: '' };
    });

    // Parse relations
    const relations = w.relatedPeople || [];

    // Build sections content
    const bioItems = (w.sections?.find(s => s.id === 'biography')?.content || []);
    const personalItems = (w.sections?.find(s => s.id === 'personal')?.content || []);
    const hobbyItems = (w.sections?.find(s => s.id === 'hobbies')?.content || []);
    const workItems = (w.sections?.find(s => s.id === 'work')?.content || []);

// Important day detection
async function checkImportantDays() {
  try {
    const resp = await fetch('data/important-days.json');
    const days = await resp.json();
    const today = new Date();
    const month = today.getMonth() + 1;
    const day = today.getDate();
    
    // Find matching important days
    const matchingDays = days.filter(d => d.month === month && d.day === day);
    
    if (matchingDays.length > 0) {
      // Sort by importance (special first, then important, then normal)
      const importanceOrder = { special: 0, important: 1, normal: 2 };
      matchingDays.sort((a, b) => importanceOrder[a.importance] - importanceOrder[b.importance]);
      
      const mostImportant = matchingDays[0];
      showImportantDayModal(mostImportant, today);
    }
  } catch (e) {
    console.error('Failed to check important days:', e);
  }
}

function showImportantDayModal(day, today) {
  const modal = document.getElementById('importantDayModal');
  const icon = document.getElementById('importantDayIcon');
  const title = document.getElementById('importantDayTitle');
  const message = document.getElementById('importantDayMessage');
  const yearDiv = document.getElementById('importantDayYear');
  const btn = document.getElementById('importantDayBtn');
  
  // Set content based on language
  if (day.type === 'birthday' && day.character === '羊宫妃那') {
    // Special birthday treatment
    modal.classList.add('birthday-special');
    icon.textContent = '🎂';
    title.textContent = t('birthdayTitle');
    message.textContent = t('birthdayMessage');
    
    // Calculate years since birth
    const birthYear = day.year;
    const age = today.getFullYear() - birthYear;
    yearDiv.textContent = currentLang === 'zh' 
      ? `${birthYear}年生まれ、${age}歳`
      : `${birthYear}年生まれ、${age}歳`;
  } else {
    modal.classList.remove('birthday-special');
    icon.textContent = day.type === 'character_birthday' ? '🎉' : '📅';
    title.textContent = day.title;
    message.textContent = day.description;
    
    // Calculate years since event
    const yearsAgo = today.getFullYear() - day.year;
    if (yearsAgo > 0) {
      yearDiv.textContent = currentLang === 'zh'
        ? `${yearsAgo}年前的今天`
        : `${yearsAgo}年前の今日`;
    } else {
      yearDiv.textContent = '';
    }
  }
  
  btn.textContent = t('close');
  
  // Show modal
  modal.classList.add('show');
  document.body.style.overflow = 'hidden';
  
  // Add event listeners
  document.getElementById('importantDayClose').addEventListener('click', closeImportantDayModal);
  document.getElementById('importantDayBtn').addEventListener('click', closeImportantDayModal);
  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeImportantDayModal();
  });
}

function closeImportantDayModal() {
  const modal = document.getElementById('importantDayModal');
  modal.classList.remove('show');
  document.body.style.overflow = '';
}

let voicesData = [];

async function loadVoices() {

function renderVoices() {
  const container = document.getElementById('voicesList');
  const filtered = currentFilter === 'all' 
    ? voicesData 
    : voicesData.filter(v => v.type === currentFilter);
  
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">暂无内容</div>';
    return;
  }
  
  container.innerHTML = filtered.map(voice => `
    <div class="voice-card" data-id="${escapeHtml(voice.id)}">
      <div class="voice-card-header">
        <div>
          <h3 class="voice-card-title">${escapeHtml(voice.title)}</h3>
          <div class="voice-card-meta">
            <span class="voice-card-date">${escapeHtml(voice.date)}</span>
            <span class="voice-card-source">${escapeHtml(voice.source)}</span>
          </div>
        </div>
        <span class="voice-card-type ${escapeHtml(voice.type)}">${voice.type === 'interview' ? '采访' : voice.type === 'article' ? '专栏' : '推文'}</span>
      </div>
      <div class="voice-card-content">
        ${escapeHtml(voice.content.length > 200 ? voice.content.substring(0, 200) + '...' : voice.content)}
      </div>
      ${voice.images && voice.images.length > 0 ? `
        <div class="voice-card-images">
          <img src="${escapeHtml(voice.images[0])}" alt="${escapeHtml(voice.title)}" loading="lazy">
        </div>
      ` : ''}
      ${voice.tags && voice.tags.length > 0 ? `
        <div class="voice-card-tags">
          ${voice.tags.map(tag => `<span class="voice-tag">${escapeHtml(tag)}</span>`).join('')}
        </div>
      ` : ''}
    </div>
  `).join('');
  
  // Add click handlers for cards
  document.querySelectorAll('.voice-card').forEach(card => {
    card.addEventListener('click', () => {
      const voice = voicesData.find(v => v.id === card.dataset.id);
      if (voice) showVoiceDetail(voice);
    });
  });
}

function setupVoiceFilters() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderVoices();
    });
  });
}

function showVoiceDetail(voice) {
  // Create modal if it doesn't exist
  let modal = document.getElementById('voiceModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'voiceModal';
    modal.className = 'voice-modal';
    modal.innerHTML = `
      <div class="voice-modal-content">
        <button class="voice-modal-close" id="voiceModalClose">✕</button>
        <div class="voice-modal-header">
          <h2 class="voice-modal-title" id="voiceModalTitle"></h2>
          <div class="voice-modal-meta">
            <span id="voiceModalDate"></span>
            <span id="voiceModalSource"></span>
            <span id="voiceModalType"></span>
          </div>
        </div>
        <div class="voice-modal-body">
          <div class="voice-modal-text" id="voiceModalText"></div>
          <div class="voice-modal-images" id="voiceModalImages"></div>
          <div class="voice-modal-tags" id="voiceModalTags"></div>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    
    // Add close handler
    document.getElementById('voiceModalClose').addEventListener('click', () => {
      modal.classList.remove('active');
    });
    
    // Close on background click
    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        modal.classList.remove('active');
      }
    });
  }
  
  // Populate modal
  document.getElementById('voiceModalTitle').textContent = voice.title;
  document.getElementById('voiceModalDate').textContent = voice.date;
  document.getElementById('voiceModalSource').textContent = voice.source;
  document.getElementById('voiceModalType').textContent = voice.type === 'interview' ? '采访' : voice.type === 'article' ? '专栏' : '推文';
  document.getElementById('voiceModalText').textContent = voice.content;
  
  // Handle images
  const imagesContainer = document.getElementById('voiceModalImages');
  if (voice.images && voice.images.length > 0) {
    imagesContainer.innerHTML = voice.images.map(img => `<img src="${escapeHtml(img)}" alt="${escapeHtml(voice.title)}">`).join('');
  } else {
    imagesContainer.innerHTML = '';
  }
  
  // Handle tags
  const tagsContainer = document.getElementById('voiceModalTags');
  if (voice.tags && voice.tags.length > 0) {
    tagsContainer.innerHTML = voice.tags.map(tag => `<span class="voice-tag">${escapeHtml(tag)}</span>`).join('');
  } else {
    tagsContainer.innerHTML = '';
  }
  
  // Show modal
  modal.classList.add('active');
}
